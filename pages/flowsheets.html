<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowsheets</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../js/script.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="layout">
        <aside class="sidebar">
          <div class="brand">SmartChart</div>
          <a class="nav-item" id="dashboard-link" href="patient.html?role=patient"
            ><span class="nav-icon">▣</span>Dashboard</a
          >
          <a class="nav-item" id="profile-link" href="profile.html?role=patient"
            ><span class="nav-icon">◌</span>Profile</a
          >
          <a
            class="nav-item"
            id="appointments-link"
            href="appointments.html?role=patient"
            ><span class="nav-icon">🗓</span>Appointments</a
          >
          <a
            class="nav-item active"
            id="flowsheets-link"
            href="flowsheets.html?role=patient"
            ><span class="nav-icon">📝</span>Flowsheets</a
          >
          <a class="nav-item" href="../index.html"
            ><span class="nav-icon">⇦</span>Logout</a
          >
        </aside>
        <main class="content">
          <header class="page-header">
            <h1>Flowsheets</h1>
            <p>Record patient vitals and observation details.</p>
          </header>

          <section class="content-card">
            <h2 id="flowsheets-heading">Observation History</h2>
            <div class="toolbar provider-only">
              <label for="flowsheet-patient-filter">Patient</label>
              <select id="flowsheet-patient-filter" data-patient-select></select>
              <span id="encounter-status" class="status-pill">Current encounter open</span>
              <button type="button" id="finalize-encounter" class="clinical-only">Finalize encounter</button>
            </div>
            <table class="styled-table">
              <thead>
                <tr>
                  <th>Encounter</th>
                  <th>Date</th>
                  <th>Observation</th>
                  <th>Value</th>
                  <th>Unit</th>
                </tr>
              </thead>
              <tbody id="observations-table"></tbody>
            </table>
            <div class="notice patient-only">
              Patients can view their own flowsheet values but cannot edit them.
            </div>
          </section>

          <section class="content-card provider-only clinical-only stack-section">
            <h2>Add Observation</h2>
            <form id="observation-form" class="form-grid">
              <label>
                Patient
                <select id="observation-patient" data-patient-select></select>
              </label>
              <label>
                Observation Type
                <select id="observation-code" required>
                  <option value="Systolic Blood Pressure" data-unit="mm[Hg]" data-example="120">
                    Systolic Blood Pressure
                  </option>
                  <option value="Diastolic Blood Pressure" data-unit="mm[Hg]" data-example="80">
                    Diastolic Blood Pressure
                  </option>
                  <option value="Heart rate" data-unit="/min" data-example="76">
                    Heart Rate
                  </option>
                  <option value="Respiratory rate" data-unit="/min" data-example="16">
                    Respiratory Rate
                  </option>
                  <option value="Body Temperature" data-unit="Cel" data-example="37.0">
                    Body Temperature
                  </option>
                  <option value="Oxygen saturation in Arterial blood" data-unit="%" data-example="98">
                    Oxygen Saturation
                  </option>
                  <option value="Body Weight" data-unit="kg" data-example="72.5">
                    Body Weight
                  </option>
                  <option value="Body Height" data-unit="cm" data-example="170.2">
                    Body Height
                  </option>
                  <option value="Pain severity - 0-10 verbal numeric rating [Score]" data-unit="{score}" data-example="2">
                    Pain Score
                  </option>
                </select>
              </label>
              <label>
                Value
                <input id="observation-value" type="text" placeholder="Example: 120" required />
              </label>
              <label>
                Unit
                <input id="observation-unit" type="text" placeholder="Auto-filled from observation type" required />
              </label>
              <label>
                Recorded At
                <input id="observation-time" type="datetime-local" required />
              </label>
              <div class="form-actions">
                <button type="submit">Save observation</button>
              </div>
            </form>
            <div id="observation-status" class="notice"></div>
            <div id="saved-observation-preview" class="saved-preview hidden"></div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
